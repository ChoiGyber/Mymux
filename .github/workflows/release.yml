name: Release

# Build installers for Windows / macOS / Linux and publish them to a GitHub
# Release whenever a version tag (e.g. v0.1.0) is pushed.
#
#   git tag v0.1.0
#   git push origin v0.1.0
#
# Users then download the installer for their OS from the Releases page.

on:
  push:
    tags:
      - "v*"
  # Allow building a release manually from the Actions tab as well.
  workflow_dispatch:

# The release job creates/updates a GitHub Release, so it needs write access.
permissions:
  contents: write

jobs:
  release:
    name: release (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS is built and uploaded manually from a Mac (see RELEASING.md),
          # so it is intentionally omitted here. Keep the version in
          # tauri.conf.json in sync so the manual Mac build matches this release.
          - platform: ubuntu-latest
            args: "--bundles deb,appimage"
          # Windows: build only the NSIS installer (.exe). The MSI (WiX) target
          # is the usual culprit when "all" fails and takes the whole job down
          # with it — so we pin to NSIS for a reliable .exe + updater artifact.
          - platform: windows-latest
            args: "--bundles nsis"

    steps:
      - uses: actions/checkout@v4

      # The mac dmg is built later from this same tag — catch a deleted
      # macOS/WKWebView guard (docs/macos-webkit-gotchas.md) before anything
      # for this release is published.
      - name: Check macOS WebKit source invariants
        run: node scripts/check-macos-gotchas.mjs

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # Tauri (mycli-desktop) needs WebKitGTK + supporting libs on Linux.
      - name: Install Linux system deps (Tauri)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            patchelf

      # aws-lc-sys (via russh) needs NASM to assemble its crypto on Windows.
      - name: Install NASM (Windows, for aws-lc-sys)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Build and publish installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the updater artifacts and emits latest.json so installed apps
          # can verify and auto-update. Set these as repository secrets.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # The Tauri app lives in a subdirectory of the Cargo workspace.
          projectPath: crates/mycli-desktop
          # Reuse the pushed git tag as the release tag/name.
          tagName: ${{ github.ref_name }}
          releaseName: "Mymux ${{ github.ref_name }}"
          releaseBody: "See the assets below to download an installer for your platform."
          # Publish as a draft so you can review before it goes public.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
